<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Berenice AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #111827, #030712);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 800px;
      padding: 40px;
    }

    h1 {
      font-size: 64px;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    .tagline {
      font-size: 22px;
      font-weight: 300;
      opacity: 0.85;
      margin-bottom: 30px;
    }

    .description {
      font-size: 18px;
      opacity: 0.7;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .button {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s ease;
    }

    .button:hover {
      background: #1d4ed8;
    }

    .footer {
      margin-top: 50px;
      font-size: 14px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Berenice AI</h1>
    <div class="tagline">
      Advanced Optimization Infrastructure
    </div>
    <div class="description">
      Proprietary high-performance architecture for solving large-scale 
      combinatorial optimization challenges.
      <br><br>
      Technology currently under confidential development.
    </div>
    <a href="mailto:contact@bereniceai.com" class="button">
      Contact
    </a>
    <div class="footer">
      © 2026 Berenice AI
    </div>
  </div>
</body>
</html>
